services:
  - type: web
    name: docsidian
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # stateless single-request conversion — safe to run multiple workers
    startCommand: gunicorn webapp:app --bind 0.0.0.0:$PORT --timeout 600 --workers 2 --threads 4
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
